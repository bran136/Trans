<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>翻译工具</title>
    <link rel="stylesheet" href="{{ asset_url('styles.css') }}">
  </head>
  <body class="app-body">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1 class="brand-title">实时在线翻译</h1>
        </div>
        <div class="top-actions">
          <button class="ghost" id="historyBtn" type="button">历史</button>
          <button class="ghost" id="monitorBtn" type="button">监控</button>
          <button class="ghost" id="settingsBtn" type="button">配置</button>
          <button class="ghost" id="logoutBtn" type="button">退出</button>
        </div>
      </header>

      <main class="workspace">
        <section class="translator">
          <div class="toolbar">
            <label>
              源语言
              <select id="sourceLang"></select>
            </label>
            <button class="swap" id="swapBtn" type="button" title="交换语言">⇄</button>
            <label>
              目标语言
              <select id="targetLang"></select>
            </label>
          </div>

          <div class="panes">
            <div class="input-pane">
              <div class="pane-head">
                <span>原文</span>
                <span id="charCount">0 字符</span>
              </div>
              <textarea id="sourceText" placeholder="输入或粘贴要翻译的内容"></textarea>
            </div>
            <div class="result-pane">
              <div class="pane-head">
                <span>结果</span>
                <span id="statusText"></span>
              </div>
              <div id="results" class="results empty">选择引擎后开始翻译</div>
            </div>
          </div>

          <div class="engine-row">
            <div>
              <div class="field-title">翻译引擎</div>
              <div id="engineList" class="engine-list"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="historyDialog">
      <section class="history-panel">
        <div class="dialog-head">
          <h2>本地历史</h2>
          <button class="icon-btn" id="closeHistoryBtn" type="button">×</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </dialog>

    <dialog id="monitorDialog">
      <section class="monitor-panel">
        <div class="dialog-head">
          <h2>服务监控</h2>
          <div class="dialog-actions compact-actions">
            <button class="ghost" id="refreshStatusBtn" type="button">刷新</button>
            <button class="ghost" id="clearCacheBtn" type="button">清空缓存</button>
            <button class="danger-btn" id="restartServiceBtn" type="button">重启服务</button>
            <button class="ghost" id="closeMonitorBtn" type="button">关闭</button>
          </div>
        </div>
        <div id="monitorMessage" class="config-message" hidden></div>
        <div class="monitor-sections">
          <section class="monitor-section">
            <h3>应用服务</h3>
            <div class="metric-grid service-metrics">
              <div class="metric-card">
                <span>进程 PID</span>
                <strong id="metricPid">-</strong>
              </div>
              <div class="metric-card">
                <span>运行时间</span>
                <strong id="metricUptime">-</strong>
              </div>
              <div class="metric-card">
                <span>CPU 占用率</span>
                <strong id="metricAppCpu">-</strong>
              </div>
              <div class="metric-card">
                <span>内存占用</span>
                <strong id="metricAppMemory">-</strong>
              </div>
              <div class="metric-card">
                <span>DeepSeek 缓存</span>
                <strong id="metricCache">-</strong>
              </div>
            </div>
          </section>
          <section class="monitor-section">
            <h3>系统</h3>
            <div class="metric-grid system-metrics">
              <div class="metric-card">
                <span>CPU 占用率</span>
                <strong id="metricSystemCpu">-</strong>
              </div>
              <div class="metric-card">
                <span>内存占用</span>
                <strong id="metricSystemMemory">-</strong>
              </div>
              <div class="metric-card">
                <span>系统负载</span>
                <strong id="metricLoad">-</strong>
              </div>
              <div class="metric-card">
                <span>磁盘</span>
                <strong id="metricDisk">-</strong>
              </div>
            </div>
          </section>
        </div>
      </section>
    </dialog>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <div class="dialog-head">
          <h2>服务配置</h2>
          <div class="dialog-actions compact-actions">
            <button class="ghost" value="cancel" type="submit">取消</button>
            <button class="primary" id="saveConfigBtn" type="button">保存配置</button>
          </div>
        </div>
        <div id="configMessage" class="config-message" hidden></div>
        <div class="settings-groups">
          <section class="settings-group">
            <h3>访问密码</h3>
            <div class="settings-grid">
              <label>
                访问密码
                <input id="appPassword" type="password" autocomplete="new-password">
              </label>
            </div>
          </section>
          <section class="settings-group">
            <h3>DeepSeek</h3>
            <div class="settings-grid">
              <label>
                API Key
                <input id="deepseekKey" type="password" autocomplete="off">
              </label>
              <label>
                Base URL
                <input id="deepseekBaseUrl" type="url">
              </label>
              <label>
                模型
                <select id="deepseekModel">
                  <option value="deepseek-v4-flash">deepseek-v4-flash</option>
                  <option value="deepseek-v4-pro">deepseek-v4-pro</option>
                  <option value="deepseek-chat">deepseek-chat</option>
                  <option value="deepseek-reasoner">deepseek-reasoner</option>
                </select>
              </label>
              <label>
                翻译风格
                <select id="deepseekStyle"></select>
              </label>
              <label>
                <span class="label-row">Temperature
                  <details class="info-help">
                    <summary>!</summary>
                    <div>控制随机性，越低越稳定。翻译推荐 0.1 到 0.3，当前推荐 0.2。</div>
                  </details>
                </span>
                <input id="deepseekTemperature" type="number" min="0" max="2" step="0.1">
              </label>
              <label>
                <span class="label-row">Thinking
                  <details class="info-help">
                    <summary>!</summary>
                    <div>推理模式。普通翻译推荐 disabled，更快且结果更直接；复杂改写或术语判断再考虑 enabled。</div>
                  </details>
                </span>
                <select id="deepseekThinking">
                  <option value="disabled">disabled</option>
                  <option value="enabled">enabled</option>
                </select>
              </label>
              <label>
                <span class="label-row">Reasoning Effort
                  <details class="info-help">
                    <summary>!</summary>
                    <div>推理投入强度。翻译通常保持 medium 即可；追求速度可选 low，复杂长文可选 high。</div>
                  </details>
                </span>
                <select id="deepseekReasoning">
                  <option value="low">low</option>
                  <option value="medium">medium</option>
                  <option value="high">high</option>
                </select>
              </label>
              <label>
                超时秒数
                <input id="deepseekTimeout" type="number" min="5" max="120">
              </label>
            </div>
            <div class="toggle-row">
              <label><input id="deepseekEnabled" type="checkbox"> 启用 DeepSeek</label>
            </div>
          </section>
          <section class="settings-group">
            <h3>谷歌翻译</h3>
            <div class="settings-grid">
              <label>
                接口地址
                <input id="googleEndpoint" type="url">
              </label>
              <label>
                超时秒数
                <input id="googleTimeout" type="number" min="5" max="120">
              </label>
            </div>
            <div class="toggle-row">
              <label><input id="googleEnabled" type="checkbox"> 启用谷歌翻译</label>
            </div>
          </section>
        </div>
      </form>
    </dialog>

    <div class="version-badge">v{{ app_version() }}</div>
    <script src="{{ asset_url('app.js') }}"></script>
  </body>
</html>
