<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Trans工具</title>
    <link rel="icon" type="image/svg+xml" sizes="any" href="{{ asset_url('site-icon.svg') }}">
    <link rel="manifest" href="{{ asset_url('site.webmanifest') }}">
    <link rel="stylesheet" href="{{ asset_url('styles.css') }}">
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel">
        <img class="brand-mark" src="{{ asset_url('site-icon.svg') }}" alt="" aria-hidden="true">
        <h1>Trans工具</h1>
        <p>输入访问密码并选择功能</p>
        <form method="post" class="login-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="password" name="password" placeholder="访问密码" autocomplete="current-password" autofocus required>
          <div class="login-targets">
            <button type="submit" name="target" value="translate">在线翻译</button>
            <button type="submit" name="target" value="reader">在线读书</button>
          </div>
        </form>
        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}
      </section>
    </main>
    <div class="version-badge">
      <span>v{{ app_version() }}</span>
      <a class="version-github-link" href="https://github.com/bran136/Trans" target="_blank" rel="noopener noreferrer" aria-label="在 GitHub 查看 Trans" title="在 GitHub 查看项目">
        <img src="{{ asset_url('github-mark.svg') }}" alt="" aria-hidden="true">
      </a>
    </div>
  </body>
</html>
