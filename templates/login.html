<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Trans工具</title>
    <link rel="stylesheet" href="{{ asset_url('styles.css') }}">
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <rect x="8" y="10" width="34" height="34" rx="10"></rect>
            <path d="M18 21h16M26 17v22M20 28c3 5 8 9 16 11M34 25c-3 7-8 12-16 15"></path>
            <rect x="26" y="24" width="30" height="30" rx="10"></rect>
            <path d="M36 44l5-12 5 12M38 40h6"></path>
          </svg>
        </div>
        <h1>Trans工具</h1>
        <p>输入访问密码并选择功能</p>
        <form method="post" class="login-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <input type="password" name="password" placeholder="访问密码" autocomplete="current-password" autofocus required>
          <div class="login-targets">
            <button type="submit" name="target" value="translate">在线翻译</button>
            <button type="submit" name="target" value="reader">在线读书</button>
          </div>
        </form>
        {% if error %}
        <div class="form-error">{{ error }}</div>
        {% endif %}
      </section>
    </main>
    <div class="version-badge">v{{ app_version() }}</div>
  </body>
</html>
