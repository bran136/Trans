name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  python-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python source
        run: python -m py_compile app.py

      - name: Import application
        env:
          APP_PASSWORD: ci-only-strong-password
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-32-characters
        run: python -c "from pathlib import Path; import app; assert app.APP_VERSION == Path('VERSION').read_text().strip()"
